<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventario PDA Expedición</title>
<meta name="theme-color" content="#202020">
<meta name="description" content="Inventario semanal de terminales PDA — Sección Expedición">

<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="stylesheet" href="./css/styles.css">

<!-- Librerías de exportación (cargadas como scripts clásicos: exponen
     variables globales XLSX y jspdf que luego usan js/exportExcel.js y
     js/exportPdf.js). No requieren build ni npm: se descargan de un CDN
     público y funcionan directamente en GitHub Pages. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<div class="app">
  <div class="cabecera">
    <h1>INVENTARIO PDA EXPEDICIÓN</h1>
    <span id="estadoConexion" class="estado-conexion">Conectando…</span>
  </div>

  <div class="stats">
    <div class="stat"><b id="statTotal">0</b><span>TOTAL PDA</span></div>
    <div class="stat op"><b id="statOperativas">0</b><span>OPERATIVAS</span></div>
    <div class="stat inc"><b id="statIncidencias">0</b><span>CON INCIDENCIAS</span></div>
    <div class="stat rep"><b id="statReparacion">0</b><span>EN REPARACIÓN</span></div>
    <div class="stat noloc"><b id="statNoLocalizada">0</b><span>NO LOCALIZADAS</span></div>
  </div>

  <div class="toolbar">
    <input id="buscador" class="buscador" type="text" placeholder="Buscar PDA (ej. CA001, EX050)…" autocomplete="off">

    <button class="btn activo" data-vista="todas">TODAS</button>
    <button class="btn sec" data-vista="incidencias">SOLO INCIDENCIAS</button>
    <button class="btn sec" data-vista="reparacion">SOLO REPARACIÓN</button>
    <button class="btn sec" data-vista="no_localizada">SOLO NO LOCALIZADAS</button>

    <div class="spacer"></div>

    <button id="btnExportarExcel" class="btn">EXPORTAR EXCEL</button>
    <button id="btnExportarPdf" class="btn sec">EXPORTAR PDF</button>
  </div>

  <div class="cuerpo">
    <div class="contenedor-tabla">
      <table>
        <thead>
          <tr>
            <th data-col="codigo">Código PDA</th>
            <th data-col="estado">Estado</th>
            <th data-col="accion_requerida">Acción requerida</th>
            <th data-col="fecha_ultima_revision">Última revisión</th>
            <th data-col="revisado_por">Revisado por</th>
          </tr>
        </thead>
        <tbody id="cuerpoTabla">
          <!-- Filas generadas por js/ui.js -->
        </tbody>
      </table>
    </div>

    <div class="panel-edicion" id="panelEdicion">
      <div id="panelVacio" class="panel-vacio">Haz clic en una fila de la tabla para editarla</div>

      <div id="panelContenido" class="oculto">
        <h2 id="panelTitulo">—</h2>
        <div class="meta" id="panelMeta"></div>

        <div class="fila-botones-rapidos">
          <button id="btnMarcarOperativa" class="btn">MARCAR OPERATIVA</button>
          <button id="btnLimpiarIncidencias" class="btn sec">LIMPIAR INCIDENCIAS</button>
        </div>

        <label for="selectEstado">Estado operativo</label>
        <select id="selectEstado"></select>

        <label>Incidencias detectadas</label>
        <div class="checklist" id="checklistIncidencias"></div>

        <label for="selectAccion">Acción requerida</label>
        <select id="selectAccion"></select>

        <label for="inputRevisadoPor">Revisado por</label>
        <input id="inputRevisadoPor" type="text" placeholder="Nombre del operario">

        <label for="textareaObservaciones">Observaciones</label>
        <textarea id="textareaObservaciones" rows="3"></textarea>
      </div>
    </div>
  </div>
</div>

<script type="module" src="./js/app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./service-worker.js");
  }
</script>
</body>
</html>
